<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <rect width="800" height="300" rx="20" fill="#0a1628"/>

  <defs>
    <linearGradient id="flowGrad" x1="0" y1="150" x2="800" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="800" height="300" rx="20" fill="url(#flowGrad)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="white">How No Ojoro Works</text>

  <!-- STEP 1: Create Event -->
  <g transform="translate(50, 55)">
    <!-- Step circle -->
    <circle cx="75" cy="50" r="40" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Calendar/event icon -->
    <rect x="58" y="38" width="34" height="28" rx="4" fill="none" stroke="#10b981" stroke-width="1.8"/>
    <line x1="58" y1="46" x2="92" y2="46" stroke="#10b981" stroke-width="1.8"/>
    <line x1="68" y1="34" x2="68" y2="42" stroke="#10b981" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="82" y1="34" x2="82" y2="42" stroke="#10b981" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Check marks on calendar -->
    <rect x="63" y="50" width="6" height="6" rx="1" fill="#10b981" opacity="0.5"/>
    <rect x="72" y="50" width="6" height="6" rx="1" fill="#10b981" opacity="0.5"/>
    <rect x="81" y="50" width="6" height="6" rx="1" fill="#10b981" opacity="0.3"/>
    <rect x="63" y="58" width="6" height="6" rx="1" fill="#10b981" opacity="0.3"/>

    <!-- Step number -->
    <circle cx="105" cy="22" r="12" fill="#10b981"/>
    <text x="105" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="white">1</text>

    <!-- Label -->
    <text x="75" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Create Event</text>
    <text x="75" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Set up tables, menus,</text>
    <text x="75" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">staff, and quantities</text>

    <!-- Cartoon person setting up -->
    <circle cx="75" cy="168" r="12" fill="#fbbf24" opacity="0.8"/>
    <circle cx="71" cy="166" r="1.5" fill="#1a1a2e"/>
    <circle cx="79" cy="166" r="1.5" fill="#1a1a2e"/>
    <path d="M71 172 Q75 176 79 172" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <rect x="67" y="180" width="16" height="18" rx="4" fill="#3b82f6" opacity="0.6"/>
    <!-- Laptop -->
    <rect x="85" y="182" width="16" height="10" rx="2" fill="#334155" stroke="#10b981" stroke-width="0.5"/>
    <rect x="83" y="192" width="20" height="2" rx="1" fill="#334155"/>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(193, 100)">
    <line x1="0" y1="5" x2="55" y2="5" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
    <polygon points="55,0 65,5 55,10" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- STEP 2: Print Tokens -->
  <g transform="translate(250, 55)">
    <circle cx="75" cy="50" r="40" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Printer icon -->
    <rect x="58" y="44" width="34" height="20" rx="3" fill="none" stroke="#10b981" stroke-width="1.8"/>
    <rect x="64" y="36" width="22" height="10" rx="2" fill="none" stroke="#10b981" stroke-width="1.2"/>
    <!-- Paper coming out -->
    <rect x="64" y="60" width="22" height="16" rx="1" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="0.8"/>
    <!-- QR on paper -->
    <rect x="67" y="63" width="6" height="6" fill="#10b981" opacity="0.4"/>
    <rect x="75" y="63" width="6" height="6" fill="#10b981" opacity="0.4"/>
    <rect x="67" y="70" width="6" height="3" fill="#10b981" opacity="0.3"/>

    <circle cx="105" cy="22" r="12" fill="#10b981"/>
    <text x="105" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="white">2</text>

    <text x="75" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Print Tokens</text>
    <text x="75" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Each token has QR,</text>
    <text x="75" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">USSD code + barcode</text>

    <!-- Token cards fanned out -->
    <rect x="50" y="158" width="30" height="42" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="0.8" transform="rotate(-8, 65, 179)"/>
    <rect x="60" y="156" width="30" height="42" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="0.8"/>
    <rect x="70" y="158" width="30" height="42" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="0.8" transform="rotate(8, 85, 179)"/>
    <!-- QR on middle card -->
    <rect x="66" y="162" width="10" height="10" fill="#10b981" opacity="0.3"/>
    <rect x="66" y="176" width="18" height="3" rx="1" fill="#64748b" opacity="0.3"/>
    <rect x="66" y="182" width="18" height="3" rx="1" fill="#64748b" opacity="0.3"/>
    <rect x="66" y="188" width="12" height="3" rx="1" fill="#64748b" opacity="0.3"/>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(393, 100)">
    <line x1="0" y1="5" x2="55" y2="5" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
    <polygon points="55,0 65,5 55,10" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- STEP 3: Guests Order -->
  <g transform="translate(450, 55)">
    <circle cx="75" cy="50" r="40" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Phone with scan icon -->
    <rect x="62" y="34" width="26" height="38" rx="4" fill="none" stroke="#10b981" stroke-width="1.8"/>
    <rect x="65" y="40" width="20" height="24" rx="2" fill="#10b981" opacity="0.1"/>
    <!-- Scan crosshairs -->
    <line x1="69" y1="48" x2="69" y2="56" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="81" y1="48" x2="81" y2="56" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="71" y1="46" x2="79" y2="46" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="71" y1="58" x2="79" y2="58" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <!-- Food icons -->
    <text x="75" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10">🍛</text>

    <circle cx="105" cy="22" r="12" fill="#10b981"/>
    <text x="105" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="white">3</text>

    <text x="75" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Guests Order</text>
    <text x="75" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Scan QR or dial USSD</text>
    <text x="75" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Browse menu and order</text>

    <!-- Happy guest with phone -->
    <circle cx="60" cy="165" r="14" fill="#fbbf24" opacity="0.8"/>
    <circle cx="56" cy="163" r="1.5" fill="#1a1a2e"/>
    <circle cx="64" cy="163" r="1.5" fill="#1a1a2e"/>
    <path d="M56 170 Q60 174 64 170" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <rect x="52" y="179" width="16" height="18" rx="4" fill="#8b5cf6" opacity="0.6"/>
    <!-- Phone -->
    <rect x="69" y="176" width="10" height="16" rx="2" fill="#334155" stroke="#10b981" stroke-width="0.5"/>

    <!-- Another guest -->
    <circle cx="95" cy="170" r="12" fill="#fbbf24" opacity="0.8"/>
    <circle cx="92" cy="168" r="1.5" fill="#1a1a2e"/>
    <circle cx="98" cy="168" r="1.5" fill="#1a1a2e"/>
    <path d="M91 174 Q95 177 99 174" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <rect x="88" y="182" width="14" height="16" rx="3" fill="#ec4899" opacity="0.6"/>
  </g>

  <!-- Arrow 3→4 -->
  <g transform="translate(593, 100)">
    <line x1="0" y1="5" x2="55" y2="5" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" opacity="0.5"/>
    <polygon points="55,0 65,5 55,10" fill="#10b981" opacity="0.5"/>
  </g>

  <!-- STEP 4: Track & Confirm -->
  <g transform="translate(650, 55)">
    <circle cx="75" cy="50" r="40" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <!-- Big checkmark -->
    <path d="M58 50 L68 60 L92 38" stroke="#10b981" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <circle cx="105" cy="22" r="12" fill="#10b981"/>
    <text x="105" y="27" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="white">4</text>

    <text x="75" y="112" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Track &amp; Confirm</text>
    <text x="75" y="127" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">Staff deliver and scan.</text>
    <text x="75" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="#64748b">You see everything live.</text>

    <!-- Staff scanning -->
    <circle cx="60" cy="163" r="12" fill="#fbbf24" opacity="0.8"/>
    <circle cx="57" cy="161" r="1.5" fill="#1a1a2e"/>
    <circle cx="63" cy="161" r="1.5" fill="#1a1a2e"/>
    <path d="M56 167 Q60 170 64 167" stroke="#1a1a2e" stroke-width="1" fill="none"/>
    <rect x="53" y="175" width="14" height="16" rx="3" fill="#f97316" opacity="0.6"/>
    <!-- Scanner -->
    <rect x="68" y="173" width="8" height="12" rx="2" fill="#334155" stroke="#10b981" stroke-width="0.5"/>

    <!-- Dashboard mini -->
    <rect x="80" y="158" width="36" height="24" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="0.8"/>
    <rect x="84" y="163" width="8" height="4" rx="1" fill="#10b981" opacity="0.6"/>
    <rect x="94" y="163" width="8" height="4" rx="1" fill="#10b981" opacity="0.4"/>
    <rect x="84" y="170" width="8" height="4" rx="1" fill="#f59e0b" opacity="0.5"/>
    <rect x="94" y="170" width="8" height="4" rx="1" fill="#10b981" opacity="0.7"/>
    <text x="106" y="168" font-family="system-ui, sans-serif" font-size="5" fill="#10b981">✓</text>
    <text x="106" y="175" font-family="system-ui, sans-serif" font-size="5" fill="#10b981">✓</text>
  </g>

  <!-- Bottom tagline -->
  <text x="400" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#64748b">From setup to service in minutes — every plate tracked, every guest served</text>
</svg>