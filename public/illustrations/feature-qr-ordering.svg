<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" fill="none">
  <rect width="280" height="280" rx="20" fill="#0a1628"/>

  <!-- Glow -->
  <circle cx="140" cy="120" r="80" fill="#10b981" opacity="0.06"/>

  <!-- Phone -->
  <rect x="90" y="40" width="100" height="170" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <rect x="96" y="55" width="88" height="140" rx="4" fill="#0f172a"/>

  <!-- Phone notch -->
  <rect x="120" y="44" width="40" height="6" rx="3" fill="#0f172a"/>

  <!-- Menu on phone screen -->
  <rect x="102" y="62" width="76" height="20" rx="4" fill="#10b981" opacity="0.15"/>
  <text x="140" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#10b981">No Ojoro Menu</text>

  <!-- Food item 1 -->
  <rect x="102" y="88" width="76" height="24" rx="4" fill="#1e293b"/>
  <circle cx="114" cy="100" r="8" fill="#f59e0b" opacity="0.3"/>
  <text x="113" y="103" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8">🍗</text>
  <text x="136" y="98" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="white">Jollof Rice</text>
  <text x="136" y="108" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">with chicken</text>
  <!-- Add button -->
  <rect x="164" y="94" width="10" height="10" rx="3" fill="#10b981"/>
  <text x="169" y="102" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white">+</text>

  <!-- Food item 2 -->
  <rect x="102" y="116" width="76" height="24" rx="4" fill="#1e293b"/>
  <circle cx="114" cy="128" r="8" fill="#f59e0b" opacity="0.3"/>
  <text x="113" y="131" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8">🥤</text>
  <text x="136" y="126" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="white">Chapman</text>
  <text x="136" y="136" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">cocktail drink</text>
  <rect x="164" y="122" width="10" height="10" rx="3" fill="#10b981"/>
  <text x="169" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white">+</text>

  <!-- Food item 3 -->
  <rect x="102" y="144" width="76" height="24" rx="4" fill="#1e293b"/>
  <circle cx="114" cy="156" r="8" fill="#f59e0b" opacity="0.3"/>
  <text x="113" y="159" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8">🍰</text>
  <text x="136" y="154" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="white">Cake Slice</text>
  <text x="136" y="164" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">wedding cake</text>
  <rect x="164" y="150" width="10" height="10" rx="3" fill="#10b981"/>
  <text x="169" y="158" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="white">+</text>

  <!-- Order button -->
  <rect x="102" y="175" width="76" height="16" rx="8" fill="#10b981"/>
  <text x="140" y="186" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="white">Place Order</text>

  <!-- QR code floating (left) -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="50" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <rect x="8" y="8" width="10" height="10" fill="#10b981" opacity="0.8"/>
    <rect x="20" y="8" width="10" height="10" fill="#10b981" opacity="0.5"/>
    <rect x="32" y="8" width="10" height="10" fill="#10b981" opacity="0.8"/>
    <rect x="8" y="20" width="10" height="10" fill="#10b981" opacity="0.4"/>
    <rect x="20" y="20" width="10" height="10" fill="#10b981" opacity="0.9"/>
    <rect x="32" y="20" width="10" height="10" fill="#10b981" opacity="0.6"/>
    <rect x="8" y="32" width="10" height="10" fill="#10b981" opacity="0.7"/>
    <rect x="20" y="32" width="10" height="10" fill="#10b981" opacity="0.5"/>
    <rect x="32" y="32" width="10" height="10" fill="#10b981" opacity="0.8"/>
  </g>

  <!-- Scan lines from QR to phone -->
  <line x1="70" y1="105" x2="90" y2="105" stroke="#10b981" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <text x="45" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Scan</text>

  <!-- USSD option (right) -->
  <g transform="translate(205, 80)">
    <rect x="0" y="0" width="55" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
    <text x="27" y="22" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#10b981">*384#</text>
    <text x="27" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">USSD</text>
    <text x="27" y="46" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#64748b">No internet</text>
  </g>
  <line x1="205" y1="105" x2="190" y2="105" stroke="#10b981" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <text x="232" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#64748b">Dial</text>

  <!-- OR divider -->
  <text x="45" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#475569">or</text>
  <text x="232" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#475569">or</text>

  <!-- Title -->
  <text x="140" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white">QR + USSD Ordering</text>
  <text x="140" y="253" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">Works on any phone • With or without internet</text>
</svg>