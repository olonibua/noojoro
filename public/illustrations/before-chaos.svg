<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Background -->
  <rect width="600" height="400" rx="20" fill="#1a1a2e"/>
  <rect x="0" y="0" width="600" height="400" rx="20" fill="url(#chaosGrad)" opacity="0.3"/>

  <defs>
    <linearGradient id="chaosGrad" x1="0" y1="0" x2="600" y2="400">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#ef4444">WITHOUT No Ojoro</text>
  <text x="300" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Typical Nigerian event food chaos</text>

  <!-- Scene: Round tables with people -->
  <!-- Table 1 - double served -->
  <ellipse cx="150" cy="220" rx="70" ry="35" fill="#2d2d44" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Plates (too many on one table) -->
  <circle cx="125" cy="210" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="150" cy="205" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="175" cy="210" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="138" cy="225" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="162" cy="225" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <!-- Food on plates -->
  <circle cx="125" cy="208" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="150" cy="203" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="175" cy="208" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="138" cy="223" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="162" cy="223" r="6" fill="#f59e0b" opacity="0.7"/>

  <!-- Person 1 (happy, over-served) -->
  <circle cx="110" cy="170" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="105" cy="167" r="2" fill="#1a1a2e"/>
  <circle cx="115" cy="167" r="2" fill="#1a1a2e"/>
  <path d="M104 175 Q110 180 116 175" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <!-- Body -->
  <rect x="100" y="186" width="20" height="25" rx="5" fill="#3b82f6" opacity="0.7"/>

  <!-- Person 2 at table 1 -->
  <circle cx="190" cy="175" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="185" cy="172" r="2" fill="#1a1a2e"/>
  <circle cx="195" cy="172" r="2" fill="#1a1a2e"/>
  <path d="M184 179 Q190 184 196 179" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <rect x="180" y="191" width="20" height="25" rx="5" fill="#8b5cf6" opacity="0.7"/>

  <!-- Label: "5 plates for 2 people!" -->
  <rect x="90" y="255" width="120" height="24" rx="12" fill="#ef4444" opacity="0.15"/>
  <text x="150" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">5 plates, 2 people!</text>

  <!-- Table 2 - empty, people angry -->
  <ellipse cx="400" cy="220" rx="70" ry="35" fill="#2d2d44" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
  <!-- Empty plates -->
  <circle cx="380" cy="215" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>
  <circle cx="420" cy="215" r="12" fill="#374151" stroke="#6b7280" stroke-width="1"/>

  <!-- Person 3 (angry, no food) -->
  <circle cx="360" cy="170" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="355" cy="167" r="2" fill="#1a1a2e"/>
  <circle cx="365" cy="167" r="2" fill="#1a1a2e"/>
  <path d="M354 177 Q360 173 366 177" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <!-- Angry eyebrows -->
  <line x1="352" y1="163" x2="358" y2="165" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="368" y1="165" x2="362" y2="163" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="350" y="186" width="20" height="25" rx="5" fill="#ec4899" opacity="0.7"/>

  <!-- Person 4 (angry, no food) -->
  <circle cx="440" cy="175" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="435" cy="172" r="2" fill="#1a1a2e"/>
  <circle cx="445" cy="172" r="2" fill="#1a1a2e"/>
  <path d="M434 179 Q440 175 446 179" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <line x1="432" y1="168" x2="438" y2="170" stroke="#1a1a2e" stroke-width="1.5"/>
  <line x1="448" y1="170" x2="442" y2="168" stroke="#1a1a2e" stroke-width="1.5"/>
  <rect x="430" y="191" width="20" height="25" rx="5" fill="#14b8a6" opacity="0.7"/>

  <!-- Label: "0 food, still waiting!" -->
  <rect x="340" y="255" width="120" height="24" rx="12" fill="#ef4444" opacity="0.15"/>
  <text x="400" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">No food, still waiting!</text>

  <!-- Confused staff in middle -->
  <circle cx="275" cy="190" r="18" fill="#fbbf24" opacity="0.9"/>
  <circle cx="269" cy="187" r="2.5" fill="#1a1a2e"/>
  <circle cx="281" cy="187" r="2.5" fill="#1a1a2e"/>
  <ellipse cx="275" cy="197" rx="5" ry="4" fill="#1a1a2e" opacity="0.5"/>
  <rect x="263" y="208" width="24" height="30" rx="5" fill="#f97316" opacity="0.7"/>
  <!-- Tray -->
  <rect x="255" y="204" width="40" height="4" rx="2" fill="#6b7280"/>
  <!-- Question marks -->
  <text x="255" y="175" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ef4444">?</text>
  <text x="290" y="178" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ef4444">?</text>
  <text x="265" y="162" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#f97316">?</text>

  <!-- Speech bubbles -->
  <!-- "Where's my food?!" -->
  <rect x="380" y="130" width="130" height="28" rx="14" fill="#2d2d44" stroke="#ef4444" stroke-width="1"/>
  <text x="445" y="149" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">Where's my food?!</text>
  <polygon points="410,158 420,158 408,168" fill="#2d2d44" stroke="#ef4444" stroke-width="1"/>

  <!-- "I already served that table!" -->
  <rect x="210" y="130" width="100" height="40" rx="14" fill="#2d2d44" stroke="#f97316" stroke-width="1"/>
  <text x="260" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#f97316">I already served</text>
  <text x="260" y="161" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="500" fill="#f97316">that table!</text>

  <!-- Caterer stressed (bottom center) -->
  <circle cx="275" cy="320" r="20" fill="#fbbf24" opacity="0.9"/>
  <circle cx="268" cy="317" r="2.5" fill="#1a1a2e"/>
  <circle cx="282" cy="317" r="2.5" fill="#1a1a2e"/>
  <path d="M267 328 Q275 323 283 328" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <!-- Sweat drops -->
  <ellipse cx="257" cy="310" rx="3" ry="5" fill="#60a5fa" opacity="0.6"/>
  <ellipse cx="295" cy="308" rx="3" ry="5" fill="#60a5fa" opacity="0.6"/>
  <rect x="260" y="340" width="30" height="30" rx="6" fill="#dc2626" opacity="0.7"/>
  <!-- Chef hat -->
  <ellipse cx="275" cy="300" rx="18" ry="8" fill="white" opacity="0.9"/>
  <rect x="263" y="294" width="24" height="8" rx="3" fill="white" opacity="0.9"/>

  <!-- Label: Caterer -->
  <rect x="225" y="375" width="100" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
  <text x="275" y="389" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">Stressed Caterer</text>

  <!-- Red X marks scattered -->
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="28" fill="#ef4444" opacity="0.15">✗</text>
  <text x="520" y="300" font-family="system-ui, sans-serif" font-size="28" fill="#ef4444" opacity="0.15">✗</text>
  <text x="480" y="120" font-family="system-ui, sans-serif" font-size="22" fill="#ef4444" opacity="0.15">✗</text>
  <text x="70" y="350" font-family="system-ui, sans-serif" font-size="22" fill="#ef4444" opacity="0.15">✗</text>
</svg>