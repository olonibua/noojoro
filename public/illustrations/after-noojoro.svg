<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <!-- Background -->
  <rect width="600" height="400" rx="20" fill="#0a1628"/>
  <rect x="0" y="0" width="600" height="400" rx="20" fill="url(#orderGrad)" opacity="0.3"/>

  <defs>
    <linearGradient id="orderGrad" x1="0" y1="0" x2="600" y2="400">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="300" y="45" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#10b981">WITH No Ojoro</text>
  <text x="300" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#94a3b8">Every guest served, every plate tracked</text>

  <!-- Table 1 - properly served -->
  <ellipse cx="150" cy="220" rx="70" ry="35" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <!-- Exactly 2 plates for 2 people -->
  <circle cx="130" cy="215" r="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <circle cx="170" cy="215" r="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <circle cx="130" cy="213" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="170" cy="213" r="6" fill="#f59e0b" opacity="0.7"/>

  <!-- Token on table -->
  <rect x="140" y="228" width="20" height="12" rx="3" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="0.8"/>
  <text x="150" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#10b981">QR</text>

  <!-- Person 1 (happy) -->
  <circle cx="110" cy="170" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="105" cy="167" r="2" fill="#1a1a2e"/>
  <circle cx="115" cy="167" r="2" fill="#1a1a2e"/>
  <path d="M104 174 Q110 180 116 174" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <rect x="100" y="186" width="20" height="25" rx="5" fill="#3b82f6" opacity="0.7"/>
  <!-- Phone in hand -->
  <rect x="92" y="190" width="8" height="14" rx="2" fill="#334155" stroke="#10b981" stroke-width="0.5"/>

  <!-- Person 2 (happy) -->
  <circle cx="190" cy="175" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="185" cy="172" r="2" fill="#1a1a2e"/>
  <circle cx="195" cy="172" r="2" fill="#1a1a2e"/>
  <path d="M184 178 Q190 184 196 178" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <rect x="180" y="191" width="20" height="25" rx="5" fill="#8b5cf6" opacity="0.7"/>

  <!-- Checkmark above table 1 -->
  <circle cx="150" cy="150" r="12" fill="#10b981" opacity="0.2"/>
  <path d="M143 150 L148 155 L157 146" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Label -->
  <rect x="90" y="255" width="120" height="24" rx="12" fill="#10b981" opacity="0.12"/>
  <text x="150" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981">2 plates, 2 people ✓</text>

  <!-- Table 2 - properly served -->
  <ellipse cx="400" cy="220" rx="70" ry="35" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="380" cy="215" r="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <circle cx="420" cy="215" r="12" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <circle cx="380" cy="213" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="420" cy="213" r="6" fill="#f59e0b" opacity="0.7"/>

  <!-- Token on table 2 -->
  <rect x="390" y="228" width="20" height="12" rx="3" fill="#10b981" opacity="0.3" stroke="#10b981" stroke-width="0.8"/>
  <text x="400" y="237" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" font-weight="700" fill="#10b981">QR</text>

  <!-- Person 3 (happy) -->
  <circle cx="360" cy="170" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="355" cy="167" r="2" fill="#1a1a2e"/>
  <circle cx="365" cy="167" r="2" fill="#1a1a2e"/>
  <path d="M354 174 Q360 180 366 174" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <rect x="350" y="186" width="20" height="25" rx="5" fill="#ec4899" opacity="0.7"/>

  <!-- Person 4 (happy) -->
  <circle cx="440" cy="175" r="16" fill="#fbbf24" opacity="0.9"/>
  <circle cx="435" cy="172" r="2" fill="#1a1a2e"/>
  <circle cx="445" cy="172" r="2" fill="#1a1a2e"/>
  <path d="M434 178 Q440 184 446 178" stroke="#1a1a2e" stroke-width="1.5" fill="none"/>
  <rect x="430" y="191" width="20" height="25" rx="5" fill="#14b8a6" opacity="0.7"/>

  <!-- Checkmark above table 2 -->
  <circle cx="400" cy="150" r="12" fill="#10b981" opacity="0.2"/>
  <path d="M393 150 L398 155 L407 146" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <rect x="340" y="255" width="120" height="24" rx="12" fill="#10b981" opacity="0.12"/>
  <text x="400" y="271" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981">2 plates, 2 people ✓</text>

  <!-- Staff with scanner (center) -->
  <circle cx="275" cy="190" r="18" fill="#fbbf24" opacity="0.9"/>
  <circle cx="269" cy="187" r="2.5" fill="#1a1a2e"/>
  <circle cx="281" cy="187" r="2.5" fill="#1a1a2e"/>
  <path d="M267 195 Q275 201 283 195" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <rect x="263" y="208" width="24" height="30" rx="5" fill="#10b981" opacity="0.7"/>
  <!-- Scanner device -->
  <rect x="290" y="205" width="14" height="22" rx="3" fill="#334155" stroke="#10b981" stroke-width="1"/>
  <rect x="293" y="209" width="8" height="10" rx="1" fill="#10b981" opacity="0.3"/>
  <!-- Scan lines -->
  <line x1="294" y1="212" x2="300" y2="212" stroke="#10b981" stroke-width="0.5"/>
  <line x1="294" y1="214" x2="300" y2="214" stroke="#10b981" stroke-width="0.5"/>
  <line x1="294" y1="216" x2="300" y2="216" stroke="#10b981" stroke-width="0.5"/>

  <!-- Thumbs up -->
  <text x="305" y="200" font-family="system-ui, sans-serif" font-size="16" fill="#10b981">👍</text>

  <!-- Caterer happy (bottom center) -->
  <circle cx="275" cy="320" r="20" fill="#fbbf24" opacity="0.9"/>
  <circle cx="268" cy="317" r="2.5" fill="#1a1a2e"/>
  <circle cx="282" cy="317" r="2.5" fill="#1a1a2e"/>
  <path d="M267 325 Q275 332 283 325" stroke="#1a1a2e" stroke-width="2" fill="none"/>
  <rect x="260" y="340" width="30" height="30" rx="6" fill="#10b981" opacity="0.7"/>
  <!-- Chef hat -->
  <ellipse cx="275" cy="300" rx="18" ry="8" fill="white" opacity="0.9"/>
  <rect x="263" y="294" width="24" height="8" rx="3" fill="white" opacity="0.9"/>
  <!-- Dashboard tablet -->
  <rect x="295" y="330" width="30" height="22" rx="3" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <!-- Mini dashboard bars -->
  <rect x="300" y="340" width="4" height="8" rx="1" fill="#10b981" opacity="0.7"/>
  <rect x="306" y="337" width="4" height="11" rx="1" fill="#10b981" opacity="0.5"/>
  <rect x="312" y="342" width="4" height="6" rx="1" fill="#10b981" opacity="0.6"/>
  <text x="310" y="335" font-family="system-ui, sans-serif" font-size="5" fill="#10b981">LIVE</text>

  <rect x="225" y="375" width="100" height="20" rx="10" fill="#10b981" opacity="0.12"/>
  <text x="275" y="389" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981">Happy Caterer</text>

  <!-- Green checkmarks scattered -->
  <text x="50" y="150" font-family="system-ui, sans-serif" font-size="24" fill="#10b981" opacity="0.15">✓</text>
  <text x="520" y="300" font-family="system-ui, sans-serif" font-size="24" fill="#10b981" opacity="0.15">✓</text>
  <text x="490" y="120" font-family="system-ui, sans-serif" font-size="20" fill="#10b981" opacity="0.15">✓</text>
  <text x="70" y="350" font-family="system-ui, sans-serif" font-size="20" fill="#10b981" opacity="0.15">✓</text>
</svg>